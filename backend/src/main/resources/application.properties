# Server configuration
server.port=8080

# Fuseki SPARQL endpoint
# Local dev:  http://localhost:3030/ontology/sparql
# In Docker:  http://jena-fuseki:3030/ontology/sparql
fuseki.sparql.endpoint=${FUSEKI_ENDPOINT:http://localhost:3030/ontology/sparql}
fuseki.update.endpoint=${FUSEKI_UPDATE_ENDPOINT:http://localhost:3030/ontology/update}
ontology.base-namespace=http://www.semanticweb.org/oleyn/ontologies/2022/4/\u043a\u0430\u0444\u0435\u0434\u0440\u0430#

# Email (SMTP) — g.nsu.ru uses Google Workspace, so Gmail SMTP
# Set MAIL_USERNAME and MAIL_PASSWORD via environment variables
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:shabanov.dima11203@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jlkxouzaydndygum}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Auth settings
auth.allowed-domain=g.nsu.ru
auth.code.ttl-minutes=10

# JWT
jwt.secret=${JWT_SECRET:change-this-secret-in-production-min-32-chars}
jwt.expiration-hours=24

# Logging
logging.level.root=INFO
logging.level.com.backend=DEBUG
logging.level.org.apache.jena=WARN
logging.level.org.springframework.mail=DEBUG


# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB