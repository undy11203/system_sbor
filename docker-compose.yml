# -----------------------------------------------------------------------
# Usage:
#   docker compose up -d              — build & start both services
#   docker compose down               — stop & remove containers
#   docker compose logs -f            — follow all logs
#
# Endpoints after start:
#   Fuseki Web UI:     http://localhost:3030/
#   SPARQL endpoint:   http://localhost:3030/ontology/sparql
#   Backend API:       http://localhost:8080/api/sparql/classes
# -----------------------------------------------------------------------
