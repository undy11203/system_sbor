services:

  jena-fuseki:
    build:
      context: .
      dockerfile: jena/Dockerfile
    container_name: jena-fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin123
    restart: unless-stopped

  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: backend
  #   ports:
  #     - "8080:8080"
